<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FLX6 Visualizer — Host</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
  <!-- Optional: silence missing favicon 404 -->
  <link rel="icon" href="data:,">

</head>
<body class="host">
  <div id="ui">
    <div id="hostStatusChrome" class="host-status-chrome" aria-label="Host runtime status">
      <div class="host-status-buttons" role="toolbar" aria-label="Host status buttons">
        <button type="button" id="hostStatusButton" class="host-status-button host-mode-button">HOST</button>
        <button type="button" id="wsStatus" class="host-status-button"></button>
        <button type="button" id="midiStatus" class="host-status-button"></button>
        <button type="button" id="controllerStatus" class="host-status-button"></button>
      </div>
      <section id="hostStatusPopover" class="host-status-popover" aria-hidden="true" hidden></section>
    </div>
    <section id="privateInvitePanel" class="private-invite-panel" hidden aria-live="polite"></section>
  </div>

  <section id="boardHost" aria-label="Controller visual"></section>

  <!-- Official host runtime entrypoint -->
  <script type="module">
    /****************************************************************
     * Core imports (host)
     ****************************************************************/
    import { initBoard, consumeInfo as boardConsume, getUnifiedMap } from '/src/board.js';
    import { initSharedPageBoot } from '/src/bootstrap-shared.js';
    import { installJogRuntime } from '/src/jog-runtime.js';
    import { attachJogCalibrationModal } from '/src/jog-calibration-ui.js';
    import { installHostDebug } from '/src/host-debug.js';
    import { installPrivateInvitePanel } from '/src/private-invite-ui.js';
    import { getRuntimeApp } from '/src/runtime/app-bridge.js';
    import { installHostProbeOnFirstConnect } from '/src/runtime/host-probe.js';
    import { initHostStatusChrome } from '/src/runtime/host-status-page.js';
    import { initHostControllerPipeline } from '/src/runtime/host-controller-pipeline.js';
    import { initHostDraftMapSync } from '/src/runtime/host-draft-map-sync.js';
    import { startHostMidiCapture } from '/src/runtime/host-midi-capture.js';
    import {
      createHostLauncherActions,
    } from '/src/runtime/host-launcher-actions.js';
    import { initHostThemePage } from '/src/runtime/host-theme-page.js';
    import { initHostToolsPage } from '/src/runtime/host-tools-page.js';
    import * as THEME      from '/src/theme.js';
    import { bootMIDIFromQuery } from '/src/midi.js';
    import { recorder as FLXRec } from '/src/recorder.js';
    import * as RECUI   from '/src/recorder_ui.js';
    import {
      createReplayDownloadFilename,
      sessionReplayLibrary,
    } from '/src/session-replay-library.js';
    import * as DIAG    from '/src/diag.js';
    import * as PRESETS from '/src/presets.js';
    import * as EDIT    from '/src/editmode.js';
    import * as WIZ     from '/src/wizard.js';
    import { initLauncher } from '/src/launcher.js';
    import { loadMappings } from '/src/mapper.js';

    /****************************************************************
     * Shared boot config for the canonical host page
     ****************************************************************/
    initSharedPageBoot({ role: 'host', wsStatusId: '__hostBootStatus' });
    const runtimeApp = getRuntimeApp();
    installHostProbeOnFirstConnect({ runtimeApp });
    installPrivateInvitePanel();

    /****************************************************************
     * Init: board + Theme (Shift+T toggles Theme)
     ****************************************************************/
    await initBoard({ hostId: 'boardHost' });

    const hostStatus = initHostStatusChrome({ runtimeApp, document });
    let launcher = null;

    /****************************************************************
     * Host controller event pipeline
     ****************************************************************/
    const hostControllerPipeline = initHostControllerPipeline({
      runtimeApp,
      boardConsume,
      hostStatus,
    });

    /****************************************************************
     * Draft map metadata sync for learn/review tools.
     * This is not official render truth.
     ****************************************************************/
    const draftMapSync = initHostDraftMapSync({
      runtimeApp,
      loadMappings,
      windowRef: window,
      setTimeoutRef: window.setTimeout.bind(window),
    });

    /****************************************************************
     * WebMIDI capture (host only)
     ****************************************************************/
    const midiHandle = await startHostMidiCapture({
      runtimeApp,
      hostStatus,
      bootMIDIFromQuery,
    });

    /****************************************************************
     * Launcher (menus + panels)
     ****************************************************************/
    const stageEl = document.getElementById('boardHost');  /* single declaration */
    const launcherActions = createHostLauncherActions({
      DIAG,
      RECUI,
      WIZ,
      EDIT,
      THEME,
      FLXRec,
      runtimeApp,
      sessionReplayLibrary,
      createReplayDownloadFilename,
      stageEl,
      documentRef: document,
      URLRef: URL,
      setTimeoutRef: window.setTimeout.bind(window),
      getLauncher: () => launcher,
    });
    launcher = initLauncher({
      actions: launcherActions,
      getStatusSnapshot: () => {
        const latestSnapshot = runtimeApp.getRecentDebuggerSnapshots?.()?.[0] || null;
        return {
          ...hostStatus.getStatusSnapshot(),
          lastAction: latestSnapshot?.recentSummary || null,
        };
      },
      mountPresetUI: (el) => PRESETS.attachPresetUI(el),
    });
    hostStatus.setLauncher(launcher);
    const hostThemePage = initHostThemePage({
      THEME,
      documentRef: document,
      windowRef: window,
      getLauncher: () => launcher,
    });

    /****************************************************************
     * Host-only jog calibration/debug tooling
     ****************************************************************/
    const hostTools = initHostToolsPage({
      runtimeApp,
      documentRef: document,
      windowRef: window,
      boardHost: stageEl,
      getUnifiedMap,
      installJogRuntime,
      attachJogCalibrationModal,
      installHostDebug,
      hostStatus,
    });
  </script>

  <!-- ===== SOP: WebSocket (host) replacement switched to external bootstrap ===== -->
  <script type="module" src="/src/bootstrap-host.js"></script>
</body>
</html>
