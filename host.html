<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FLX6 Visualizer — Host</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
  <!-- Optional: silence missing favicon 404 -->
  <link rel="icon" href="data:,">

</head>
<body class="host">
  <div id="ui">
    <div id="hostStatusChrome" class="host-status-chrome" aria-label="Host runtime status">
      <div class="host-status-buttons" role="toolbar" aria-label="Host status buttons">
        <button type="button" id="hostStatusButton" class="host-status-button host-mode-button">HOST</button>
        <button type="button" id="wsStatus" class="host-status-button"></button>
        <button type="button" id="midiStatus" class="host-status-button"></button>
        <button type="button" id="controllerStatus" class="host-status-button"></button>
      </div>
      <section id="hostStatusPopover" class="host-status-popover" aria-hidden="true" hidden></section>
    </div>
    <section id="privateInvitePanel" class="private-invite-panel" hidden aria-live="polite"></section>
  </div>

  <section id="boardHost" aria-label="Controller visual"></section>

  <!-- Official host runtime entrypoint -->
  <script type="module">
    /****************************************************************
     * Core imports (host)
     ****************************************************************/
    import { initBoard, consumeInfo as boardConsume, getUnifiedMap } from '/src/board.js';
    import { initSharedPageBoot } from '/src/bootstrap-shared.js';
    import { installJogRuntime } from '/src/jog-runtime.js';
    import { attachJogCalibrationModal } from '/src/jog-calibration-ui.js';
    import { installHostDebug } from '/src/host-debug.js';
    import { installPrivateInvitePanel } from '/src/private-invite-ui.js';
    import { getRuntimeApp } from '/src/runtime/app-bridge.js';
    import { installHostProbeOnFirstConnect } from '/src/runtime/host-probe.js';
    import {
      createHostControllerStatusState,
      applyMidiStatusToControllerState,
      absorbControllerRuntimeInfo,
      describeHostControllerStatus,
      describeHostMIDIStatus,
      getHostStatusHealthState,
      describeHostWSStatus,
    } from '/src/host-status.js';
    import * as THEME      from '/src/theme.js';
    import { bootMIDIFromQuery } from '/src/midi.js';
    import { recorder as FLXRec } from '/src/recorder.js';
    import * as RECUI   from '/src/recorder_ui.js';
    import {
      createReplayDownloadFilename,
      sessionReplayLibrary,
    } from '/src/session-replay-library.js';
    import * as DIAG    from '/src/diag.js';
    import * as PRESETS from '/src/presets.js';
    import * as EDIT    from '/src/editmode.js';
    import * as WIZ     from '/src/wizard.js';
    import { initLauncher } from '/src/launcher.js';
    import { loadMappings } from '/src/mapper.js';

    /****************************************************************
     * Shared boot config for the canonical host page
     ****************************************************************/
    initSharedPageBoot({ role: 'host', wsStatusId: '__hostBootStatus' });
    const runtimeApp = getRuntimeApp();
    installHostProbeOnFirstConnect({ runtimeApp });
    installPrivateInvitePanel();

    /****************************************************************
     * Init: board + Theme (Shift+T toggles Theme)
     ****************************************************************/
    await initBoard({ hostId: 'boardHost' });

    /****************************************************************
     * Status helpers
     ****************************************************************/
    const hostStatusChromeEl = document.getElementById('hostStatusChrome');
    const hostStatusPopoverEl = document.getElementById('hostStatusPopover');
    const hostStatusButtonEl = document.getElementById('hostStatusButton');
    const wsStatusEl = document.getElementById('wsStatus');
    const midiStatusEl = document.getElementById('midiStatus');
    const controllerStatusEl = document.getElementById('controllerStatus');
    const hostControllerStatus = createHostControllerStatusState();
    const hostCopy = Object.freeze({
      label: 'HOST',
      title: 'FLX6 Controller Studio',
      detail: 'Official profile truth stays front-and-center. Tools stay reachable without crowding the stage.',
    });
    const statusModels = {
      hostLink: describeHostWSStatus(runtimeApp.getWSStatus()),
      midiLane: describeHostMIDIStatus(runtimeApp.getMIDIStatus()),
      controllerPath: describeHostControllerStatus(hostControllerStatus),
    };
    let activeStatusPopover = null;
    let launcher = null;

    function ensureStatusButton(el, label, { showDot = true } = {}) {
      if (!el || el.__statusButtonReady) return el;
      el.type = 'button';
      el.classList.add('host-status-button');
      el.setAttribute('aria-haspopup', 'dialog');
      el.setAttribute('aria-controls', 'hostStatusPopover');
      const dotEl = document.createElement('span');
      dotEl.className = 'host-status-dot';
      dotEl.setAttribute('aria-hidden', 'true');
      const labelEl = document.createElement('span');
      labelEl.className = 'host-status-label';
      el.innerHTML = '';
      if (showDot) el.appendChild(dotEl);
      el.appendChild(labelEl);
      el.__statusButtonReady = true;
      el.__statusDotEl = dotEl;
      el.__statusLabelEl = labelEl;
      labelEl.textContent = label;
      return el;
    }

    function buildStatusButtonTitle(label, model) {
      if (!model) return label;
      return [label, model.summary, model.detail].filter(Boolean).join(' | ');
    }

    function renderStatusButton(el, label, model, { showDot = true, modeButton = false, active = false } = {}) {
      const button = ensureStatusButton(el, label, { showDot });
      if (!button) return;
      button.classList.toggle('host-mode-button', modeButton);
      button.classList.toggle('is-open', active);
      button.classList.remove('is-ok', 'is-bad');
      if (!modeButton) {
        button.classList.add(getHostStatusHealthState(model) === 'ok' ? 'is-ok' : 'is-bad');
      }
      if (button.__statusLabelEl) button.__statusLabelEl.textContent = label;
      if (button.__statusDotEl) button.__statusDotEl.hidden = !showDot;
      button.setAttribute('aria-expanded', active ? 'true' : 'false');
      button.title = modeButton ? `${label} | ${hostCopy.title}` : buildStatusButtonTitle(label, model);
    }

    function describeActivePopover() {
      if (activeStatusPopover === 'host') {
        return {
          label: hostCopy.label,
          title: hostCopy.title,
          detail: hostCopy.detail,
          health: null,
        };
      }

      if (activeStatusPopover === 'hostLink') {
        return {
          label: 'Host Link',
          title: statusModels.hostLink?.summary || 'Host Link',
          detail: statusModels.hostLink?.detail || '',
          health: getHostStatusHealthState(statusModels.hostLink),
        };
      }

      if (activeStatusPopover === 'midiLane') {
        return {
          label: 'MIDI Lane',
          title: statusModels.midiLane?.summary || 'MIDI Lane',
          detail: statusModels.midiLane?.detail || '',
          health: getHostStatusHealthState(statusModels.midiLane),
        };
      }

      if (activeStatusPopover === 'controllerPath') {
        return {
          label: 'Controller Path',
          title: statusModels.controllerPath?.summary || 'Controller Path',
          detail: statusModels.controllerPath?.detail || '',
          health: getHostStatusHealthState(statusModels.controllerPath),
        };
      }

      return null;
    }

    function renderStatusPopover() {
      if (!hostStatusPopoverEl) return;
      const popover = describeActivePopover();
      hostStatusPopoverEl.innerHTML = '';
      hostStatusPopoverEl.classList.remove('open', 'is-ok', 'is-bad');

      if (!popover) {
        hostStatusPopoverEl.hidden = true;
        hostStatusPopoverEl.setAttribute('aria-hidden', 'true');
        return;
      }

      if (popover.health === 'ok') hostStatusPopoverEl.classList.add('is-ok');
      if (popover.health === 'bad') hostStatusPopoverEl.classList.add('is-bad');

      const kickerEl = document.createElement('div');
      kickerEl.className = 'host-status-popover-kicker';
      kickerEl.textContent = popover.label;
      const titleEl = document.createElement('strong');
      titleEl.className = 'host-status-popover-title';
      titleEl.textContent = popover.title;
      hostStatusPopoverEl.appendChild(kickerEl);
      hostStatusPopoverEl.appendChild(titleEl);

      if (popover.detail) {
        const detailEl = document.createElement('p');
        detailEl.className = 'host-status-popover-detail';
        detailEl.textContent = popover.detail;
        hostStatusPopoverEl.appendChild(detailEl);
      }

      hostStatusPopoverEl.hidden = false;
      hostStatusPopoverEl.classList.add('open');
      hostStatusPopoverEl.setAttribute('aria-hidden', 'false');
    }

    function renderStatusChrome() {
      renderStatusButton(hostStatusButtonEl, 'HOST', null, {
        showDot: false,
        modeButton: true,
        active: activeStatusPopover === 'host',
      });
      renderStatusButton(wsStatusEl, 'Host Link', statusModels.hostLink, {
        active: activeStatusPopover === 'hostLink',
      });
      renderStatusButton(midiStatusEl, 'MIDI Lane', statusModels.midiLane, {
        active: activeStatusPopover === 'midiLane',
      });
      renderStatusButton(controllerStatusEl, 'Controller Path', statusModels.controllerPath, {
        active: activeStatusPopover === 'controllerPath',
      });
      renderStatusPopover();
    }

    function closeStatusPopover() {
      if (!activeStatusPopover) return;
      activeStatusPopover = null;
      renderStatusChrome();
    }

    function toggleStatusPopover(key) {
      activeStatusPopover = activeStatusPopover === key ? null : key;
      renderStatusChrome();
    }

    function renderWSStatus(status) {
      statusModels.hostLink = describeHostWSStatus(status);
      renderStatusChrome();
      launcher?.refresh?.();
    }

    function renderMIDIStatus(status) {
      statusModels.midiLane = describeHostMIDIStatus(status);
      renderStatusChrome();
      launcher?.refresh?.();
    }

    function renderControllerStatus() {
      statusModels.controllerPath = describeHostControllerStatus(hostControllerStatus);
      renderStatusChrome();
      runtimeApp.setControllerRuntime?.(hostControllerStatus);
      launcher?.refresh?.();
    }

    function noteControllerDetails(details) {
      absorbControllerRuntimeInfo(hostControllerStatus, details);
      renderControllerStatus();
    }

    const setMIDIStatus = (s) => {
      renderMIDIStatus(s);
      applyMidiStatusToControllerState(hostControllerStatus, s);
      renderControllerStatus();
    };
    const setWSStatus = (status) => {
      renderWSStatus(status);
    };
    [
      [hostStatusButtonEl, 'host'],
      [wsStatusEl, 'hostLink'],
      [midiStatusEl, 'midiLane'],
      [controllerStatusEl, 'controllerPath'],
    ].forEach(([button, key]) => {
      button?.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleStatusPopover(key);
      });
    });
    document.addEventListener('click', (event) => {
      if (!activeStatusPopover) return;
      if (hostStatusChromeEl?.contains(event.target)) return;
      closeStatusPopover();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      closeStatusPopover();
    });
    renderStatusChrome();
    runtimeApp.setWSStatusHandler(setWSStatus);
    runtimeApp.setMIDIStatusHandler(setMIDIStatus);
    renderWSStatus(runtimeApp.getWSStatus());
    renderMIDIStatus(runtimeApp.getMIDIStatus());
    renderControllerStatus();

    /****************************************************************
     * SOP MERGE: MIDI shape normalizer + single forwarding wrapper
     * - Normalizes any {type:'midi_like'|'midi'|'info', payload:{...}}
     * - Harmonizes CC and Note events to d1/d2 + controller/value
     * - Sends normalized object over WS, then forwards to original consumer
     ****************************************************************/
    function normalizeInfo(x) {
      if (!x || typeof x !== 'object') return x;

      // Unwrap wrapper types
      if (x.type && typeof x.payload === 'object') {
        const t = String(x.type).toLowerCase();
        if (t === 'midi_like' || t === 'midi' || t === 'info') {
          x = x.payload;
        }
      }

      const info = { ...x };
      const t = String(info.type || '').toLowerCase();

      // CC: accept controller/value or d1/d2, mirror both
      if (t === 'cc') {
        const d1 = info.d1 ?? info.controller ?? 0;
        const d2 = info.d2 ?? info.value ?? 0;
        info.controller = d1;
        info.value = d2;
        info.d1 = d1;
        info.d2 = d2;
        info.type = 'cc';
        return info;
      }

      // Notes: ensure d1/d2 exist
      if (t === 'noteon' || t === 'noteoff') {
        info.d1 = info.d1 ?? info.code ?? 0;
        info.d2 = info.d2 ?? info.value ?? 0;
        return info;
      }

      // Generic 'midi' envelope with mtype
      if (t === 'midi') {
        const mt = String(info.mtype || '').toLowerCase();
        if (mt === 'cc') {
          info.type = 'cc';
          const d1 = info.d1 ?? info.controller ?? info.code ?? 0;
          const d2 = info.d2 ?? info.value ?? 0;
          info.controller = d1; info.value = d2; info.d1 = d1; info.d2 = d2;
          return info;
        }
        if (mt === 'noteon' || mt === 'noteoff') {
          info.type = mt;
          info.d1 = info.d1 ?? info.code ?? 0;
          info.d2 = info.d2 ?? info.value ?? 0;
          return info;
        }
      }

      // Unknown types fall through unchanged
      return info;
    }

    runtimeApp.setNormalizer(normalizeInfo);
    runtimeApp.setInfoConsumer((info) => {
      noteControllerDetails({
        deviceName: info?.deviceName || info?.device?.inputName || info?.device?.name || null,
        profileId: info?.profileId || info?.device?.profileId || info?.profile?.id || null,
        profileLabel: info?.profile?.displayName || null,
        transport: info?.transport || info?.device?.transport || 'midi',
        ready: true,
        timestamp: info?.timestamp,
      });
      if (runtimeApp.getWSClient()?.isAlive?.()) runtimeApp.getWSClient().send(info);
      const result = boardConsume(info);
      launcher?.refresh?.();
      return result;
    });

    /****************************************************************
     * Draft map metadata sync for learn/review tools.
     * This is not official render truth.
     ****************************************************************/
    function pushMap() {
      try {
        const draftMapArray = loadMappings() || [];
        if (runtimeApp.getWSClient()?.sendMap) {
          runtimeApp.getWSClient().sendMap(draftMapArray);
        } else {
          runtimeApp.getWSClient()?.send?.({ type: 'map:set', map: draftMapArray, ts: Date.now() });
        }
      } catch (e) {
        console.warn('[host] pushMap failed', e);
      }
    }
    setTimeout(pushMap, 250);
    window.addEventListener('flx:map-updated', pushMap);

    /****************************************************************
     * WebMIDI capture (host only)
     ****************************************************************/
    try {
      console.log('[MIDI] starting init via bootMIDIFromQuery');
      const handle = await bootMIDIFromQuery({
        onInfo: function(info){ try { runtimeApp.consumeNormalizedInfo(info); } catch {} },
        onStatus: function(s){ try { runtimeApp.setMIDIStatus(s); } catch {} }
      });
      const deviceInfo = handle?.getDeviceInfo?.() || {};
      noteControllerDetails({
        ...deviceInfo,
        deviceName: deviceInfo.inputName || deviceInfo.name || handle?.input || null,
        ready: !!handle?.input,
      });
      console.log('[MIDI] init OK');
    } catch (e) {
      console.warn('[MIDI] init failed', e);
      runtimeApp.setMIDIStatus('host: off');
    }

    /****************************************************************
     * Launcher (menus + panels)
     ****************************************************************/
    const stageEl = document.getElementById('boardHost');  /* single declaration */
    function getCurrentReplayPayload() {
      return JSON.parse(FLXRec.exportJSON());
    }

    function downloadReplayPayload(payload, filename = 'session-replay.json') {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = filename;
      a.href = url;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function loadSavedReplay(replayId) {
      const record = sessionReplayLibrary.loadReplay(replayId);
      if (!record) return null;
      FLXRec.loadFromObject(record.payload);
      RECUI.refresh();
      return record;
    }

    const launcherActions = {
      // Panels
      toggleDiag:     () => DIAG.toggle(),
      showDiag:       () => DIAG.show(),
      hideDiag:       () => DIAG.hide(),
      isDiagOpen:     () => DIAG.isOpen?.() ?? false,
      toggleTimeline: () => RECUI.toggle(),
      showTimeline:   () => RECUI.show(),
      hideTimeline:   () => RECUI.hide?.(),
      toggleWizard:   () => WIZ.toggle(),
      showWizard:     () => (typeof WIZ.show === 'function' ? WIZ.show() : WIZ.toggle()),
      toggleEdit:     () => EDIT.toggle(),
      showEdit:       () => (typeof EDIT.show === 'function' ? EDIT.show() : EDIT.toggle()),
      hideEdit:       () => (typeof EDIT.hide === 'function' ? EDIT.hide() : EDIT.toggle()),
      isEditOpen:     () => EDIT.isOpen?.() ?? EDIT.onState?.() ?? false,
      clearDiag:      () => runtimeApp.clearRecentDebuggerSnapshots?.(),
      // Theme + view
      toggleTheme:    () => launcher?.toggleSection('theme'),
      applyThemePreset: (name) => THEME.applyPreset?.(name),
      fit:            () => stageEl.classList.remove('fill'),
      fill:           () => stageEl.classList.add('fill'),
      toggleBG:       () => document.body.classList.toggle('transparent'),
      // Recorder
      recStart:       () => { FLXRec.start(); setTimeout(()=>RECUI.refresh(), 50); },
      recStop:        () => { FLXRec.stop();  RECUI.refresh(); },
      recPlay:        () => FLXRec.play({ speed: 1.0, loop: false }),
      recDownload:    () => FLXRec.download('take.json'),
      recSaveLocal:   ({ name } = {}) => sessionReplayLibrary.saveReplay({ name, payload: getCurrentReplayPayload() }),
      recLoadText:    async (text) => { await FLXRec.loadFromText(text); RECUI.refresh(); },
      listSavedReplays: () => sessionReplayLibrary.listReplays(),
      recLoadSaved:   (replayId) => loadSavedReplay(replayId),
      recPlaySaved:   (replayId) => {
        const record = loadSavedReplay(replayId);
        if (record) FLXRec.play({ speed: 1.0, loop: false });
      },
      recDownloadSaved: (replayId) => {
        const record = sessionReplayLibrary.loadReplay(replayId);
        if (record) downloadReplayPayload(record.payload, createReplayDownloadFilename(record));
      },
      recDeleteSaved: (replayId) => sessionReplayLibrary.deleteReplay(replayId),
    };
    launcher = initLauncher({
      actions: launcherActions,
      getStatusSnapshot: () => {
        const latestSnapshot = runtimeApp.getRecentDebuggerSnapshots?.()?.[0] || null;
        return {
          hostLink: describeHostWSStatus(runtimeApp.getWSStatus()),
          midiLane: describeHostMIDIStatus(runtimeApp.getMIDIStatus()),
          controllerPath: describeHostControllerStatus(hostControllerStatus),
          lastAction: latestSnapshot?.recentSummary || null,
        };
      },
      mountPresetUI: (el) => PRESETS.attachPresetUI(el),
    });
    THEME.attachThemeDesigner({
      mount: document.getElementById('launcherThemeMount'),
      svgRoot: document.querySelector('#boardHost svg'),
    });
    THEME.ensurePreset?.('instrument-dark');

    /****************************************************************
     * Jog Physics (“Tape Mode”) via shared runtime
     * (will see normalized events because of wrapper above)
     ****************************************************************/
    const Jog = installJogRuntime({
      getUnifiedMap: () => getUnifiedMap?.() || [],
      exposeGlobalControls: true,
    });
    attachJogCalibrationModal({
      jogRuntime: Jog,
      trigger: document.getElementById('openJogCalibration'),
    });

    /****************************************************************
     * Local-only debug helper for no-hardware host -> WS -> viewer tests
     ****************************************************************/
    installHostDebug({
      getUnifiedMap: () => getUnifiedMap?.() || [],
      consumeInfo: (info) => runtimeApp.consumeInfo(info),
      getWSClient: () => runtimeApp.getWSClient(),
    });

    /****************************************************************
     * Toolbar + Hotkeys
     ****************************************************************/
    document.addEventListener('keydown', (e)=>{
      if (e.shiftKey && e.key.toLowerCase()==='t') launcher?.toggleSection('theme');
    });
  </script>

  <!-- ===== SOP: WebSocket (host) replacement switched to external bootstrap ===== -->
  <script type="module" src="/src/bootstrap-host.js"></script>
</body>
</html>
