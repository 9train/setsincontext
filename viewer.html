<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FLX6 Visualizer — Viewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    #fab,
    #fabSheet,
    .viewer-menu {
      display: none !important;
    }
  </style>
</head>
<body class="viewer">
  <div id="boardHost" aria-label="Controller visual"></div>

  <div class="viewer-hud">
    <div id="statusBar" class="viewer-status panel-shell" role="status" aria-live="polite">
      <div class="viewer-chip-row">
        <span id="wsStatus" class="viewer-chip">Host link: connecting</span>
        <span id="midiStatus" class="viewer-chip">Viewer lane: ready</span>
        <span id="lastAction" class="viewer-chip viewer-last-action hidden" hidden>Last action: waiting for input</span>
      </div>
      <details class="viewer-tools">
        <summary>View</summary>
        <div class="viewer-tools-panel">
          <div class="tool-group">
            <div class="tool-group-title">Stage</div>
            <div class="tool-row">
              <button id="fit" type="button" title="Fit SVG inside window">Fit</button>
              <button id="fill" type="button" title="Fill the frame">Fill</button>
              <button id="toggleBG" type="button" title="Toggle transparent background">Transparent</button>
            </div>
          </div>
          <div class="tool-group">
            <div class="tool-group-title">Appearance</div>
            <div class="tool-row">
              <button id="themePreset" type="button" title="Toggle presentation preset">Classic / Dark</button>
              <button id="themeToggle" type="button" title="Open theme designer">Theme Studio</button>
            </div>
            <div class="tool-note">Viewer defaults to the calmer instrument-dark presentation. Technical controls stay tucked away unless needed.</div>
          </div>
        </div>
      </details>
    </div>
  </div>

  <script type="module">
    import { initViewerPage } from '/src/runtime/viewer-page.js';

    await initViewerPage();
  </script>

  <script type="module" src="/src/bootstrap-viewer.js"></script>
</body>
</html>
